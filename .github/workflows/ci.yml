name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Generate the Prisma client so typecheck/build can resolve @/generated/prisma.
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format
      - run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Build-time only; no DB connection is opened during `next build`.
          DATABASE_URL: postgresql://phishlens:phishlens@localhost:5432/phishlens?schema=public
          REDIS_URL: redis://localhost:6379
          ANALYZER_URL: http://localhost:8000

  analyzer:
    name: analyzer (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: analyzer/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build analyzer image
        uses: docker/build-push-action@v6
        with:
          context: ./analyzer
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
