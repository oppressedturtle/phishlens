# PhishLens — full local stack: web (Next.js) + analyzer (FastAPI) + postgres + redis.
# Copy .env.example to .env first:  cp .env.example .env
# Bring it up:                      docker compose up --build
name: phishlens

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phishlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phishlens}
      POSTGRES_DB: ${POSTGRES_DB:-phishlens}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phishlens} -d ${POSTGRES_DB:-phishlens}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  analyzer:
    build:
      context: ./analyzer
    restart: unless-stopped
    ports:
      - "${ANALYZER_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      analyzer:
        condition: service_started
    environment:
      NODE_ENV: production
      # Service-name hostnames resolve on the compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-phishlens}:${POSTGRES_PASSWORD:-phishlens}@postgres:5432/${POSTGRES_DB:-phishlens}?schema=public
      REDIS_URL: redis://redis:6379
      ANALYZER_URL: http://analyzer:8000
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
  redisdata:
